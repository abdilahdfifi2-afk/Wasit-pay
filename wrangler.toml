name = "wasit-pay"
type = "service"
main = "dist/server/server.js"
compatibility_date = "2024-11-15"

# Cloudflare Pages configuration
pages_build_output_dir = "dist/client"

# Environment variables configuration
[env.production]
name = "wasit-pay-production"

[env.preview]
name = "wasit-pay-preview"

# KV Namespace bindings (if needed for caching)
[[kv_namespaces]]
binding = "CACHE"
id = "your-kv-namespace-id"
preview_id = "your-kv-namespace-preview-id"

# Durable Objects (if needed)
# [[durable_objects.bindings]]
# name = "COUNTER"
# class_name = "Counter"

# Analytics Engine (if needed)
# [[analytics_engine_datasets]]
# binding = "ANALYTICS"

# Limits
limits = { cpu_ms = 50000 }

# Observability
[observability]
enabled = true

# Build configuration
[build]
command = "npm run build"
cwd = "./"
watch_paths = ["src/**/*.ts", "src/**/*.tsx"]

# Routes configuration
[[routes]]
pattern = "example.com/*"
zone_name = "example.com"

# Custom domain (update with your actual domain)
# [[routes]]
# pattern = "wasit-pay.com/*"
# zone_name = "wasit-pay.com"
